server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Gzip compression ──────────────────────────────────────
    # Compresses JS/CSS before sending — typical React bundle goes
    # from ~500 KB to ~150 KB, making the app load faster.
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;

    # ── Static assets (JS, CSS, images) ───────────────────────
    # Vite generates hashed filenames like main.a3f9b2.js.
    # Since the filename changes on every build, the browser can
    # cache these forever — they'll never go stale.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── API proxy to backend ───────────────────────────────────
    # Forwards /api/... requests to the Spring Boot container.
    # In docker-compose, "backend" resolves to the backend container
    # via Docker's internal DNS.
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── React Router fallback ──────────────────────────────────
    # This is the critical rule for SPAs.
    # When the user refreshes on /tasks, Nginx looks for a file
    # at that path — finds nothing — and without this rule returns 404.
    # try_files falls back to index.html so React Router handles routing.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
